name: idr-covariate-discovery
title: IDR PKPD with Nonlinear Numerical Baseline Covariates
version: 1.0.0
date: 2026-01-30
authors:
  - name: Niklas Korsbo
    affiliation: Pumas-AI
    email: niklas@pumas.ai
description: A synthetic PK-PD dataset from an indirect response model with complex nonlinear covariate effects. The task is predictive modeling — train on the training set and achieve the best marginal log-likelihood on the held-out test subjects.
keywords:
  - pharmacodynamics
  - indirect-response
  - predictive-modeling
  - nonlinear-covariates
  - synthetic-data
  - pk-pd
data_type: synthetic
therapeutic_area: general
n_subjects: 1300
n_subjects_train: 300
n_subjects_test: 1000
n_observations: 20768
n_observations_train: 4796
n_observations_test: 15972
tasks:
  - name: predictive-performance
    type: regression
    description: Predict PK concentration (y_pk) and PD response (y_pd) for held-out test subjects, evaluated jointly by marginal log-likelihood
    target: y_pk,y_pd
    output_format: {type: individual_predictions, columns: [id, time, pred_pk, pred_pd]}
    metric: marginal_log_likelihood
license: MIT
doi: TBD
