name: example-pk-model-selection
title: Example PK Model Selection Benchmark
version: 1.0.0
date: 2025-10-16
authors:
  - name: Jane Researcher
    affiliation: Example University
    email: jane.researcher@example.edu
  - name: John Modeler
    affiliation: Pharma Institute
    email: john.modeler@pharma.org
description: A synthetic two-compartment pharmacokinetic dataset for evaluating model selection methodologies
keywords:
  - pharmacokinetics
  - model-selection
  - two-compartment
  - synthetic-data
  - covariates
data_type: synthetic
therapeutic_area: general
n_subjects: 200
n_subjects_train: 140
n_subjects_test: 60
n_observations: 960
n_observations_train: 673
n_observations_test: 287
tasks:
  - name: structural-model-selection
    type: classification
    description: Identify the correct structural model from {1cmt, 2cmt, 3cmt}
    output_format: {type: class_predictions, columns: [MODEL_SELECTED]}
    metric: accuracy

  - name: covariate-model-selection
    type: classification
    description: Identify which covariates have true effects on CL and Vc
    output_format: {type: class_predictions, columns: [COVARIATE, SELECTED]}
    metric: f1

  - name: prediction-accuracy
    type: regression
    description: Predict plasma concentrations in the test set
    target: DV
    output_format: {type: individual_predictions, columns: [ID, TIME, PRED]}
    metric: rmse
license: CC-BY-4.0
doi: TBD
